<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plateformes — APS Administration</title>
  <link rel="stylesheet" href="../../_shared/css/navbar.css" />
  <link rel="stylesheet" href="../../admin/connexions/connexions.css" />
  <style>
    .plat-card{ background:var(--bg2); border:1px solid var(--border); border-radius:10px; margin-bottom:12px; overflow:hidden; }
    .plat-card-header{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; cursor:pointer; }
    .plat-card-header:hover{ background:rgba(255,255,255,.03); }
    .plat-left{ display:flex; align-items:center; gap:12px; flex:1; }
    .plat-icon{ font-size:24px; width:40px; text-align:center; flex-shrink:0; }
    .plat-name{ font-size:15px; font-weight:800; margin-bottom:3px; }
    .plat-meta{ display:flex; gap:8px; align-items:center; }
    .plat-right{ display:flex; align-items:center; gap:8px; }
    .plat-body{ border-top:1px solid var(--border); padding:14px 16px; background:var(--bg3); display:none; }
    .plat-body.open{ display:block; }

    /* Orgs liées */
    .org-section-title{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim); margin-bottom:8px; }
    .org-row{ display:flex; align-items:center; justify-content:space-between; padding:8px 10px; background:var(--bg2); border:1px solid var(--border); border-radius:8px; margin-bottom:6px; }
    .org-name{ font-size:13px; font-weight:600; }
    .org-envs{ display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
    .env-chip{ font-size:10px; padding:2px 8px; border-radius:4px; font-weight:700; }
    .env-chip.prod{ background:rgba(39,174,96,.15); color:#2ecc71; }
    .env-chip.dev{ background:rgba(52,152,219,.15); color:#3498db; }
    .env-chip.qa{ background:rgba(241,196,15,.15); color:#f1c40f; }
    .env-chip.poc{ background:rgba(155,89,182,.15); color:#9b59b6; }
    .env-chip.missing{ background:rgba(231,76,60,.1); color:#e74c3c; }

    .add-org-row{ display:flex; gap:8px; margin-top:10px; }
    .add-org-row select{ flex:1; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:7px 10px; font-size:13px; }

    .badge-type{ font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; background:rgba(255,255,255,.08); color:var(--text-dim); text-transform:uppercase; }
    .badge-active{ font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; background:rgba(39,174,96,.12); color:#2ecc71; }
    .badge-inactive{ font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; background:rgba(231,76,60,.12); color:#e74c3c; }
    .chevron{ transition:transform .2s; display:inline-block; }
    .chevron.open{ transform:rotate(90deg); }
  </style>
</head>
<body>

  <header class="aps-header">
    <div class="aps-header-left">
      <img src="../../_shared/assets/aps-logo.svg" alt="Askida" class="aps-logo" />
      <span class="breadcrumb"><a href="../../index.html">APS</a> › <a href="#">Administration</a> › Plateformes</span>
    </div>
    <div class="aps-header-right">
      <nav class="aps-navbar">
        <a class="aps-nav-link" href="../../index.html">Home</a>
      </nav>
    </div>
  </header>

  <main class="adm-main">
    <div class="adm-toolbar">
      <h1 class="adm-title">⚙️ Plateformes</h1>
      <button class="btn" id="btn-new" type="button">+ Nouvelle plateforme</button>
    </div>
    <div id="plat-list">
      <div class="adm-loading">Chargement…</div>
    </div>
  </main>

  <!-- ── PANNEAU LATÉRAL ── -->
  <aside class="side-panel" id="side-panel">
    <div class="side-panel-header">
      <span id="panel-title">Nouvelle plateforme</span>
      <button class="side-close" id="btn-close-panel" type="button">×</button>
    </div>
    <div class="side-panel-body">

      <div class="field">
        <label>Nom *</label>
        <input type="text" id="f-name" placeholder="Ex : Iconik" />
      </div>

      <div class="field">
        <label>Slug *</label>
        <input type="text" id="f-slug" placeholder="Ex : iconik" />
        <small style="color:var(--text-dim);font-size:11px;">Identifiant unique, minuscules sans espaces</small>
      </div>

      <div class="field">
        <label>Type</label>
        <select id="f-type">
          <option value="integration">Intégration (MAM, DAM, PAM...)</option>
          <option value="runtime">Runtime (Node-RED, n8n...)</option>
          <option value="encoder">Encodeur (FFMPEG, FLICS...)</option>
          <option value="ai">IA (Ollama...)</option>
        </select>
      </div>

      <div class="field">
        <label>Icône</label>
        <input type="text" id="f-icon" placeholder="Ex : 🎬" />
      </div>

      <div class="field">
        <label>Version</label>
        <input type="text" id="f-version" placeholder="1.0.0" />
      </div>

      <div class="field field-toggle">
        <label>Active</label>
        <input type="checkbox" id="f-active" checked />
      </div>

    </div>
    <div class="side-panel-footer">
      <button class="btn ghost" id="btn-cancel" type="button">Annuler</button>
      <button class="btn" id="btn-save" type="button">✓ Sauvegarder</button>
    </div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <script src="platforms.js"></script>
</body>
</html>
