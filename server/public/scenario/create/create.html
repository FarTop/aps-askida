<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Askida Platform Studio — Créer un scénario</title>
  <link rel="stylesheet" href="../../index.css" />
  <link rel="stylesheet" href="create.css" />
</head>

<body>
  <div class="page">

    <!-- Header -->
    <header>
      <div class="dbc-logo">
        <img src="../../_shared/assets/aps-logo.svg" alt="Askida" class="aps-logo">
        <span class="dbc-org-badge">Studio · Nouveau scénario</span>
      </div>
    </header>
    <div class="aps-divider"></div>

    <!-- Hero -->
    <div class="hero">
      <h1>Créer un scénario</h1>
      <p>
        Un scénario représente une proposition cohérente d’architecture,
        de workflows et de règles métier.
      </p>
    </div>

    <!-- Contenu -->
    <main class="grid" aria-label="Créer un scénario">

      <section class="card" style="grid-column:span 12;">
        <div class="corner-tr"></div>
        <div class="corner-bl"></div>

        <div class="card-bd">

          <!-- Nom -->
          <div class="field">
            <label for="scn-name">Nom du scénario</label>
            <input id="scn-name" type="text" placeholder="Ex : Centralisation Prod" />
          </div>

          <!-- Description -->
          <div class="field">
            <label for="scn-desc">Description (optionnelle)</label>
            <input id="scn-desc" type="text"
                   placeholder="Objectif, périmètre, hypothèses…" />
          </div>

          <!-- Source -->
          <div class="field">
            <label>Source initiale</label>
            <div class="radio-row">
              <label>
                <input type="radio" name="scn-source" checked>
                Importer depuis une plateforme
              </label>
              <label>
                <input type="radio" name="scn-source">
                Démarrer avec un scénario vide
              </label>
              <label>
                <input type="radio" name="scn-source">
                Utiliser un template métier
              </label>
            </div>
          </div>

          <!-- Sélection plateforme (placeholder v1) -->
          <div class="field">
            <label>Plateforme source</label>
            <select disabled>
              <option>Iconik (à venir)</option>
            </select>
          </div>

        </div>

        <!-- Actions -->
        <div class="cta-row">
          <button class="btn ghost"
                  onclick="window.location.href='studio.htmlio
          </button>
        </div>

      </section>

    </main>

    <footer style="padding:20px;text-align:center;color:var(--text-dim);font-size:12px;">
      Askida Platform Studio · Scenario Builder v1
    </footer>

  </div>
  <script src="create.js" defer></script>
</body>
</html>
