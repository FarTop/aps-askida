<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Recherche APS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="search.css">
</head>
<body>
  <div id="aps-header"></div>
  <div class="aps-main">
    <div class="aps-criteria">
      <div class="aps-criteria-header"><h2>&#128269; Criteres de recherche</h2></div>
      <div class="aps-saved-bar">
        <select id="sr-saved-list" class="aps-select aps-flex2-fs11" onchange="chargerSearch(this.value)">
          <option value="">— Searches sauvegardées —</option>
        </select>
        <button class="aps-btn-del aps-hidden" id="btn-del-search" onclick="supprimerSearch()">✕</button>
      </div>
      <div class="aps-saved-bar aps-saved-bar-notop">
        <input id="sr-save-name" class="aps-saved-name" placeholder="Nom de la recherche…">
        <button class="aps-btn-save" onclick="sauvegarderSearch()">💾 Sauvegarder</button>
      </div>
      <div class="aps-criteria-body" id="blocks-container"></div>
      <div class="aps-expr-section">
        <label class="aps-label">Expression</label>
        <input id="sr-expression" class="aps-input" placeholder="ex : 1 AND 2 AND (3 OR 4)">
        <div class="aps-expr-hint">Numeros de blocs + AND OR NOT parentheses. Vide = tous actifs.</div>
      </div>
      <div class="aps-criteria-footer">
        <div class="aps-footer-row">
          <label>Retourner</label>
          <select id="sr-return-block" class="aps-select aps-flex1"></select>
        </div>
        <div class="aps-footer-row">
          <label>Limite</label>
          <input id="sr-limit" class="aps-input aps-flex1" type="number" value="500" min="1" max="2000">
        </div>
        <button class="aps-search-btn" id="btn-search" onclick="lancerRecherche()">&#9654; Rechercher</button>
      </div>
    </div>
    <div class="aps-results">
      <div class="aps-results-header">
        <span class="aps-results-title">Resultats</span>
        <span class="aps-results-count" id="results-count"></span>
        <div class="aps-results-actions">
          <button class="aps-action-btn aps-hidden" onclick="exportCsv()" id="btn-csv">&#11015; CSV</button>
          <button class="aps-action-btn" onclick="window.print()">&#128424; Imprimer</button>
        </div>
      </div>
      <div id="results-area" class="aps-table-wrap">
        <div class="aps-empty">
          <div class="aps-empty-icon">&#128269;</div>
          <div class="aps-empty-msg">Definissez vos criteres et lancez la recherche.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="../_shared/aps-nav.js"></script>
  <script src="script-search.js"></script>
</body>
</html>
